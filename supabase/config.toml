project_id = "minga-expeditions"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://minga-expeditions-web.vercel.app"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://localhost:5174/**",
  "exp://localhost:8081",
  "minga://auth/callback",
  "https://minga-expeditions-web.vercel.app/**",
  "https://minga-expeditions-mobile-web.vercel.app/**",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# MVT tile endpoint is called anonymously by MapLibre in the apps — no JWT.
[functions.geo-tile]
verify_jwt = false

# Order-status polling runs from the OrderSuccessPage immediately after Wompi
# redirects the browser back. Guests have no session, so we open the function
# to anonymous callers — the order UUID is the unguessable secret, the
# function strips wompi_reference/PII before responding.
[functions.wompi-order-status]
verify_jwt = false

# Order creation also runs unauthenticated for guest checkouts; the function
# itself reads the optional Authorization header and trusts it only when
# present.
[functions.wompi-create-order]
verify_jwt = false
